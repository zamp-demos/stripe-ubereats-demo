<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stripe Dashboard - UberEats Payments</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f6f9fc;
  color: #1a1f36;
}

/* Login Page */
.login-page {
  display: none;
  min-height: 100vh;
  background: linear-gradient(135deg, #5469d4 0%, #635bff 100%);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-page.active {
  display: flex;
}

.login-container {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  width: 100%;
  max-width: 420px;
  padding: 48px 40px;
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}

.login-logo h1 {
  font-size: 32px;
  font-weight: 700;
  color: #635bff;
}

.login-logo p {
  font-size: 14px;
  color: #8898aa;
  margin-top: 8px;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 13px;
  font-weight: 600;
  color: #1a1f36;
}

.form-group input {
  padding: 12px 14px;
  border: 1px solid #e3e8ee;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.2s;
}

.form-group input:focus {
  outline: none;
  border-color: #635bff;
  box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.1);
}

.login-btn {
  background: #635bff;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.2s;
}

.login-btn:hover {
  background: #5469d4;
}

/* Main App */
.app-container {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}

.app-container.active {
  display: flex;
}

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid #e3e8ee;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 24px;
}

.header-logo {
  font-size: 24px;
  font-weight: 700;
  color: #635bff;
}

.header-nav {
  display: flex;
  gap: 8px;
}

.nav-item {
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  color: #6b7c93;
  font-weight: 500;
  transition: all 0.2s;
}

.nav-item:hover {
  background: #f6f9fc;
  color: #1a1f36;
}

.nav-item.active {
  background: #f6f9fc;
  color: #635bff;
  font-weight: 600;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  color: #6b7c93;
}

.logout-btn {
  background: #f6f9fc;
  border: 1px solid #e3e8ee;
  color: #1a1f36;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}

.logout-btn:hover {
  background: #e3e8ee;
}

/* Main Content */
.main-content {
  flex: 1;
  display: flex;
  padding: 24px;
  gap: 24px;
}

/* Payments List Panel */
.payments-panel {
  width: 400px;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #e3e8ee;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 130px);
}

.payments-header {
  padding: 20px 24px;
  border-bottom: 1px solid #e3e8ee;
}

.payments-header h2 {
  font-size: 18px;
  font-weight: 600;
  color: #1a1f36;
}

.payments-count {
  font-size: 13px;
  color: #6b7c93;
  margin-top: 4px;
}

.payments-list {
  flex: 1;
  overflow-y: auto;
}

.payment-item {
  padding: 16px 24px;
  border-bottom: 1px solid #f6f9fc;
  cursor: pointer;
  transition: background 0.2s;
}

.payment-item:hover {
  background: #f6f9fc;
}

.payment-item.active {
  background: #f0f4ff;
  border-left: 3px solid #635bff;
}

.payment-id {
  font-size: 13px;
  font-family: 'Courier New', monospace;
  color: #635bff;
  font-weight: 600;
  margin-bottom: 6px;
}

.payment-merchant {
  font-size: 15px;
  font-weight: 500;
  color: #1a1f36;
  margin-bottom: 6px;
}

.payment-amount {
  font-size: 16px;
  font-weight: 600;
  color: #1a1f36;
  margin-bottom: 8px;
}

.payment-meta {
  font-size: 12px;
  color: #6b7c93;
  display: flex;
  gap: 12px;
}

.payment-status {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
}

.status-succeeded {
  background: #d4edda;
  color: #155724;
}

.status-pending {
  background: #fff8e1;
  color: #f57c00;
}

.status-failed {
  background: #f8d7da;
  color: #721c24;
}

/* Payment Detail Panel */
.payment-detail-panel {
  flex: 1;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #e3e8ee;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 130px);
}

.payment-detail-header {
  padding: 24px;
  border-bottom: 1px solid #e3e8ee;
}

.payment-detail-title {
  font-size: 20px;
  font-weight: 600;
  color: #1a1f36;
  margin-bottom: 8px;
}

.payment-detail-subtitle {
  font-size: 14px;
  color: #6b7c93;
  font-family: 'Courier New', monospace;
}

.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.detail-section {
  margin-bottom: 32px;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: #1a1f36;
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.detail-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.detail-label {
  font-size: 13px;
  color: #6b7c93;
  font-weight: 500;
}

.detail-value {
  font-size: 14px;
  color: #1a1f36;
  font-weight: 500;
}

.detail-value.code {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  background: #f6f9fc;
  padding: 4px 8px;
  border-radius: 4px;
  display: inline-block;
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.timeline-item {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: #f6f9fc;
  border-radius: 6px;
  border-left: 3px solid #635bff;
}

.timeline-icon {
  width: 40px;
  height: 40px;
  background: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.timeline-content {
  flex: 1;
}

.timeline-title {
  font-size: 14px;
  font-weight: 600;
  color: #1a1f36;
  margin-bottom: 4px;
}

.timeline-text {
  font-size: 13px;
  color: #6b7c93;
  margin-bottom: 6px;
}

.timeline-timestamp {
  font-size: 12px;
  color: #8898aa;
}

.metadata-table {
  width: 100%;
  border-collapse: collapse;
  background: #f6f9fc;
  border-radius: 6px;
  overflow: hidden;
}

.metadata-table tr {
  border-bottom: 1px solid #e3e8ee;
}

.metadata-table tr:last-child {
  border-bottom: none;
}

.metadata-table td {
  padding: 12px 16px;
  font-size: 13px;
}

.metadata-table td:first-child {
  color: #6b7c93;
  font-weight: 500;
  width: 40%;
}

.metadata-table td:last-child {
  color: #1a1f36;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #8898aa;
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state-text {
  font-size: 14px;
}
</style>
</head>

// Login handling
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  if (username === 'finance@ubereats.com' && password === 'UberEats2026!') {
    document.getElementById('loginPage').classList.remove('active');
    document.getElementById('appContainer').classList.add('active');
    renderPaymentsList();
  } else {
    alert('Invalid credentials. Use: finance@ubereats.com / UberEats2026!');
  }
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', function() {
  document.getElementById('appContainer').classList.remove('active');
  document.getElementById('loginPage').classList.add('active');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
});

// Render payments list
function renderPaymentsList() {
  const paymentsList = document.getElementById('paymentsList');
  paymentsList.innerHTML = '';
  
  // Sort by created date descending (newest first)
  const sortedPayments = Object.values(paymentsData).sort((a, b) => 
    new Date(b.created) - new Date(a.created)
  );
  
  sortedPayments.forEach((payment, index) => {
    const paymentItem = document.createElement('div');
    paymentItem.className = 'payment-item';
    if (index === 0) paymentItem.classList.add('active');
    paymentItem.dataset.paymentId = payment.id;
    
    const statusClass = payment.status;
    
    paymentItem.innerHTML = `
      <div class="payment-id">${payment.id}</div>
      <div class="payment-merchant">${payment.merchant}</div>
      <div class="payment-amount">${payment.amount}</div>
      <div class="payment-meta">
        <span>${payment.method}</span>
        <span>${payment.created}</span>
      </div>
      <span class="payment-status status-${statusClass}">${payment.status}</span>
    `;
    
    paymentItem.addEventListener('click', function() {
      document.querySelectorAll('.payment-item').forEach(item => item.classList.remove('active'));
      this.classList.add('active');
      renderPaymentDetail(payment.id);
    });
    
    paymentsList.appendChild(paymentItem);
  });
  
  // Load first payment by default
  if (sortedPayments.length > 0) {
    renderPaymentDetail(sortedPayments[0].id);
  }
}

// Render payment detail
function renderPaymentDetail(paymentId) {
  const payment = paymentsData[paymentId];
  if (!payment) return;
  
  // Update header
  document.getElementById('paymentTitle').textContent = `${payment.merchant} - ${payment.amount}`;
  document.getElementById('paymentSubtitle').textContent = payment.id;
  
  // Build timeline HTML
  const timelineHTML = payment.timeline.map(item => `
    <div class="timeline-item">
      <div class="timeline-icon">${item.icon}</div>
      <div class="timeline-content">
        <div class="timeline-title">${item.title}</div>
        <div class="timeline-text">${item.text}</div>
        <div class="timeline-timestamp">${item.timestamp}</div>
      </div>
    </div>
  `).join('');
  
  // Build metadata table
  const metadataRows = Object.entries(payment.metadata).map(([key, value]) => `
    <tr>
      <td>${key.replace(/_/g, ' ')}</td>
      <td>${value}</td>
    </tr>
  `).join('');
  
  // Render complete detail
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-section">
      <div class="section-title">Payment Details</div>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="detail-label">Payment ID</div>
          <div class="detail-value code">${payment.id}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Status</div>
          <div class="detail-value">${payment.status}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Amount</div>
          <div class="detail-value">${payment.amount} ${payment.currency}</div>
        </div>
        <div class="detail-item">
